[program:admin-worker]
process_name=%(program_name)s_%(process_num)02d
command=php artisan queue:work
directory=/data/www/admin
autostart=true
autorestart=true
numprocs=1
user=www-data
redirect_stderr=true

[program:customer-worker]
process_name=%(program_name)s_%(process_num)02d
command=php artisan queue:work
directory=/data/www/customer
autostart=true
autorestart=true
numprocs=1
user=www-data
redirect_stderr=true
services:
  nginx:
    build: ./nginx
    volumes:
      - ${ADMIN_HOST_PATH}/backend/src/:/data/www/admin
      - ${CUSTOMER_HOST_PATH}/backend/src/:/data/www/customer
      - ./nginx/sites:/etc/nginx/conf.d
    ports:
      - ${DOCKER_NGINX_PORT}:80
    depends_on:
      - php
  php:
    build: ./php
    volumes:
      - ${ADMIN_HOST_PATH}/backend/src/:/data/www/admin
      - ${CUSTOMER_HOST_PATH}/backend/src/:/data/www/customer
    working_dir: /data/www/admin
    links:
      - mysql
  worker:
    build: ./worker
    volumes:
      - ${ADMIN_HOST_PATH}/backend/src/:/data/www/admin
      - ${CUSTOMER_HOST_PATH}/backend/src/:/data/www/customer
      - ./worker/supervisor.d:/etc/supervisor.d
    working_dir: /data/www/admin
    ports:
      - 9001:9001
    links:
      - mysql
  mysql:
    build: ./mysql
    ports:
      - ${DOCKER_MYSQL_PORT}:3306
    volumes:
      - ./mysql/data/mysql-5.7:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: hido
      MYSQL_PASSWORD: password
  redis:
    image: "redis:5.0.6"
    ports:
      - ${DOCKER_REDIS_PORT}:6379
    volumes:
      - "./data/redis:/data"
  ## Mailpit ##############################################
  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_HTTP_PORT}:8025"
      - "${MAILPIT_SMTP_PORT}:1025"
  customer-frontend:
    build:
      context: ./node/14
    tty: true
    volumes:
      - ${CUSTOMER_HOST_PATH}/frontend:/var/www
    expose:
      - 5000
    working_dir: /var/www
    mem_limit: 8g
    mem_reservation: 4g
    environment:
      - NODE_OPTIONS=--max-old-space-size=8192
  admin-frontend:
    build:
      context: ./node/24
    tty: true
    volumes:
      - ${ADMIN_HOST_PATH}/frontend:/var/www
    expose:
      - 5173
    working_dir: /var/www
    mem_limit: 8g
    mem_reservation: 4g
    environment:
      - NODE_OPTIONS=--max-old-space-size=8192
